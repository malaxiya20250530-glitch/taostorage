<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦀 TaoStorage — 浏览器P2P存储节点</title>
    <meta name="description" content="TaoStorage 浏览器 P2P 节点 — 道可道，非常道。在浏览器中运行分布式存储节点。">
    <meta name="theme-color" content="#1a1a2e">
    <meta property="og:title" content="🦀 TaoStorage — 你的数据，你的道">
    <meta property="og:description" content="浏览器即节点 — 每个访问者都是 P2P 存储网络的一部分。道可道，非常道。">
    <meta property="og:image" content="https://malaxiya20250530-glitch.github.io/taostorage/og-image.png">
    <meta property="og:url" content="https://tao.storage">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="logo-icon">🦀</span>
            <span class="logo-text">TaoStorage</span>
            <span class="logo-sub">道可道</span>
        </div>
        <div class="header-actions">
            <button class="btn btn-ghost" onclick="switchLang()" id="btnLang">🌐 EN</button>
            <a href="https://github.com/malaxiya20250530-glitch/taostorage" target="_blank" class="btn btn-ghost">⭐ GitHub</a>
            <div class="node-status" id="nodeStatus">
                <span class="status-dot offline"></span>
                <span class="status-text">未启动</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <div class="hero-animation"><div class="tao-symbol">☯</div></div>
            <h1>你的数据，<span class="highlight">你的道</span></h1>
            <p class="hero-subtitle" id="heroSubtitle">浏览器即节点 — 每个访问者都是 P2P 存储网络的一部分</p>
            <div class="hero-actions">
                <button class="btn btn-primary btn-large" id="btnStartNode" onclick="initNode()">🌐 启动节点</button>
                <button class="btn btn-secondary" onclick="createInvite()">📤 邀请好友</button>
                <button class="btn btn-secondary" onclick="loadDemo()">🎬 载入演示数据</button>
            </div>
        </div>
        <div class="hero-stats">
            <div class="stat-card">
                <div class="stat-value" id="globalNodes">1</div>
                <div class="stat-label">🌍 当前节点</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="storedObjects">0</div>
                <div class="stat-label">📦 存储对象</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="myPeers">0</div>
                <div class="stat-label">🔗 对等节点</div>
            </div>
        </div>
    </section>

    <main class="main-content">
        <section class="panel panel-data">
            <h2>📦 我的数据</h2>
            <div class="data-form">
                <div class="form-row">
                    <input type="text" id="inputKey" placeholder="Key (如: 道、阴阳、万物)" class="input">
                    <input type="text" id="inputValue" placeholder="Value (数据内容)" class="input input-wide">
                </div>
                <div class="form-row">
                    <input type="text" id="inputTags" placeholder="标签 (逗号分隔)" class="input">
                    <button class="btn btn-accent" onclick="putData()">📝 写入</button>
                </div>
            </div>
            <div class="data-search">
                <input type="text" id="inputSearch" placeholder="🔍 搜索数据..." class="input input-wide" oninput="searchData()">
            </div>
            <div class="data-list" id="dataList">
                <div class="empty-state">
                    <span class="empty-icon">☯</span>
                    <p id="emptyText">暂无数据 — 点击"载入演示数据"体验</p>
                </div>
            </div>
        </section>

        <section class="panel panel-node">
            <h2>🌐 节点信息</h2>
            <div class="node-info">
                <div class="info-row">
                    <span class="info-label">节点 ID</span>
                    <span class="info-value mono" id="nodeId">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">状态</span>
                    <span class="info-value" id="networkStatus">⏸️ 未启动</span>
                </div>
                <div class="info-row">
                    <span class="info-label">热度</span>
                    <span class="info-value" id="nodeHeat">🌱 屯卦 (初生)</span>
                </div>
                <div class="info-row">
                    <span class="info-label">版本</span>
                    <span class="info-value">v0.3.0</span>
                </div>
            </div>
            <div class="node-actions">
                <button class="btn btn-outline" onclick="exportBackup()">💾 导出备份</button>
                <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">📂 导入</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBackup(event)">
                <button class="btn btn-outline" onclick="createInvite()">📤 邀请</button>
            </div>
            <p class="invite-footer" id="inviteLink" style="display:none;margin-top:12px;word-break:break-all;font-size:12px;color:var(--accent)"></p>
        </section>
    </main>

    <div class="modal-overlay" id="inviteModal">
        <div class="modal">
            <h2>📤 邀请好友</h2>
            <p>分享链接，邀请更多人加入 TaoStorage 网络！</p>
            <div class="invite-box">
                <input type="text" id="inviteLinkInput" readonly class="input input-wide" onclick="this.select()">
                <button class="btn btn-primary" onclick="copyInvite()">📋 复制</button>
            </div>
            <p class="invite-hint">🏆 每邀请一人，节点信誉 +10</p>
            <button class="btn btn-ghost" onclick="closeModal()">关闭</button>
        </div>
    </div>

    <script>/* === App Logic === */
'use strict'; let _node=null;
async function initNode(){
    _node=new JsTaoNode();
    document.getElementById('nodeId').textContent=_node.node_id;
    document.getElementById('nodeStatus').querySelector('.status-dot').className='status-dot online';
    document.getElementById('nodeStatus').querySelector('.status-text').textContent='运行中';
    document.getElementById('networkStatus').textContent='✅ 已就绪';
    document.getElementById('nodeHeat').textContent='🌱 屯卦 (初生)';
    document.getElementById('btnStartNode').textContent='✅ 节点已启动';
    document.getElementById('btnStartNode').disabled=true;
    updateStats();
}
function JsTaoNode(){
    this.node_id='tao-'+Math.random().toString(36).slice(2,10);
    this.storage=JSON.parse(localStorage.getItem('tao_storage')||'[]');
    this.peers=[]; this.connected=false;
}
JsTaoNode.prototype.put=function(k,v,t){
    const unit={yin:{payload:v,content_hash:this._hash(v)},yang:{name:k,created_at:Math.floor(Date.now()/1000),tags:t||[],heat:0},qi:{hexagram:'Zhun',replica_count:1}};
    this.storage.push(unit); localStorage.setItem('tao_storage',JSON.stringify(this.storage)); return unit.yin.content_hash;
};
JsTaoNode.prototype.get=function(k){const u=this.storage.find(x=>x.yang.name===k);return u?JSON.stringify(u):null};
JsTaoNode.prototype.list=function(){return this.storage.map(u=>({key:u.yang.name,value:u.yin.payload,tags:u.yang.tags,hexagram:u.qi.hexagram,heat:u.yang.heat,id:u.yin.content_hash}))};
JsTaoNode.prototype.search=function(q){q=q.toLowerCase();return this.storage.filter(u=>u.yang.name.toLowerCase().includes(q)||u.yin.payload.toLowerCase().includes(q)||(u.yang.tags||[]).some(t=>t.toLowerCase().includes(q))).map(u=>({key:u.yang.name,value:u.yin.payload,tags:u.yang.tags,hexagram:u.qi.hexagram,heat:u.yang.heat}))};
JsTaoNode.prototype.stats=function(){return{node_id:this.node_id,objects:this.storage.length,peers:this.peers.length,connected:this.connected,tags:[...new Set(this.storage.flatMap(u=>u.yang.tags||[]))]}};
JsTaoNode.prototype.export_backup=function(){return JSON.stringify(this.storage,null,2)};
JsTaoNode.prototype.import_backup=function(j){try{const d=JSON.parse(j);this.storage.push(...d);localStorage.setItem('tao_storage',JSON.stringify(this.storage));return d.length}catch(e){return 0}};
JsTaoNode.prototype._hash=function(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h).toString(16).padStart(8,'0')};

function loadDemo(){
    if(!_node)initNode();
    if(!_node)return;
    const demos=[
        ['道','道可道，非常道',['welcome','tao','genesis']],
        ['阴阳','一阴一阳之谓道',['philosophy','tao']],
        ['万物','道生一，一生二，二生三，三生万物',['philosophy','tao']],
        ['欢迎','欢迎来到 TaoStorage 网络！在这里，你的数据属于你自己。',['welcome']],
        ['隐私','去中心化存储意味着没有人能审查、删除或窃取你的数据。',['privacy','security']],
        ['自由','你的数据，你的道。Your Data, Your Tao.',['manifesto']],
    ];
    demos.forEach(([k,v,t])=>{if(!_node.get(k))_node.put(k,v,t)});
    refreshList(); updateStats(); showToast('🎬 已载入 '+demos.length+' 条演示数据');
}
function putData(){
    if(!_node){alert('请先启动节点');return}
    const k=document.getElementById('inputKey').value.trim(),v=document.getElementById('inputValue').value.trim();
    if(!k||!v){alert('请输入 Key 和 Value');return}
    const t=document.getElementById('inputTags').value.trim().split(/[,，]\s*/).filter(Boolean);
    _node.put(k,v,t);
    document.getElementById('inputKey').value='';document.getElementById('inputValue').value='';document.getElementById('inputTags').value='';
    refreshList();updateStats();showToast('✅ 已写入: '+k);
}
function searchData(){refreshList()}
function refreshList(){
    if(!_node)return;
    const q=document.getElementById('inputSearch').value.trim();
    const items=q?_node.search(q):_node.list();
    const el=document.getElementById('dataList');
    if(!items||!items.length){
        el.innerHTML='<div class="empty-state"><span class="empty-icon">☯</span><p>'+(q?'未找到匹配数据':'暂无数据')+'</p></div>';
        return;
    }
    const hexIcons={Zhun:'🌱',Jiji:'✅',Tai:'🔥',Pi:'❄️',Bo:'🚨',Kun:'🏛️'};
    el.innerHTML=items.map(i=>{
        const tags=(i.tags||[]).map(t=>'<span class="tag">'+esc(t)+'</span>').join('');
        return '<div class="data-item"><div class="data-item-header"><span class="data-hexagram">'+(hexIcons[i.hexagram]||'📦')+'</span><span class="data-key">'+esc(i.key)+'</span><span class="data-heat">'+(i.heat?'🔥 '.repeat(Math.min(i.heat,5)):'')+'</span></div><div class="data-value">'+esc(i.value||'')+'</div>'+(tags?'<div class="data-tags">'+tags+'</div>':'')+'</div>';
    }).join('');
}
function updateStats(){
    if(!_node)return;
    const s=_node.stats();
    document.getElementById('storedObjects').textContent=s.objects;
    document.getElementById('myPeers').textContent=s.peers;
    let heat='🌱 屯卦 (初生)';
    if(s.objects>5)heat='🔥 泰卦 (通泰)';
    else if(s.objects>0)heat='✅ 既济 (功成)';
    document.getElementById('nodeHeat').textContent=heat;
}
function exportBackup(){
    if(!_node){alert('请先启动节点');return}
    const blob=new Blob([_node.export_backup()],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tao-backup-'+Date.now()+'.json';a.click();URL.revokeObjectURL(blob);
    showToast('💾 备份已下载');
}
function importBackup(e){
    if(!_node){alert('请先启动节点');return}
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(e2)=>{const c=_node.import_backup(e2.target.result);refreshList();updateStats();showToast('📦 已导入 '+c+' 条数据')};
    reader.readAsText(file);
}
function createInvite(){
    const id=_node?_node.node_id:'tao-'+Math.random().toString(36).slice(2,8);
    const code=btoa(id).slice(0,10);
    const link=window.location.origin+'?invite='+code;
    document.getElementById('inviteLinkInput').value=link;document.getElementById('inviteModal').classList.add('active');
    document.getElementById('inviteLink').style.display='block';
    document.getElementById('inviteLink').textContent='🔗 邀请链接: '+link;
}
function copyInvite(){const inp=document.getElementById('inviteLinkInput');inp.select();navigator.clipboard.writeText(inp.value).then(()=>showToast('📋 已复制'));}
function closeModal(){document.getElementById('inviteModal').classList.remove('active')}
function switchLang(){showToast('🌐 English version coming soon')}
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function showToast(m){let t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.classList.add('show'),10);setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300)},2500)}

// Auto-init on page load
document.addEventListener('DOMContentLoaded',()=>{
    const params=new URLSearchParams(window.location.search);
    if(params.get('invite'))showToast('🎉 通过邀请链接加入!');
    // Check if there's existing data
    const stored=localStorage.getItem('tao_storage');
    if(stored&&JSON.parse(stored).length>0){
        initNode();
        refreshList();
        updateStats();
    }
});
    </script>
    <script>
    if("serviceWorker" in navigator){
        window.addEventListener("load",()=>{
            navigator.serviceWorker.register("/sw.js").then(r=>console.log("🦀 PWA ready")).catch(()=>{});
        });
    }
    </script>
</body>
</html>
