name: 🌐 Deploy Browser Node

on:
  push:
    branches: [ main ]
    paths:
      - 'www/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔨 Prepare www (create placeholder pkg for WASM)
        run: |
          mkdir -p www/pkg
          echo "// WASM placeholder - run 'wasm-pack build www/tao-browser --target web --out-dir ../pkg' to build" > www/pkg/tao_browser.js
          echo 'self.wasm_bindgen = () => {};' >> www/pkg/tao_browser.js

      - name: 📤 Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: www

      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
