name: 🌐 Deploy WASM Browser Node

on:
  push:
    branches: [ main ]
    paths:
      - 'www/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: 🌐 Build Browser Node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: 📦 Install wasm-pack
        run: curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh -s -- -y

      - name: 🔨 Build WASM
        run: |
          cd www
          wasm-pack build tao-browser --target web --out-dir ../pkg
          cd ..

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: www

  deploy:
    name: 🚀 Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
