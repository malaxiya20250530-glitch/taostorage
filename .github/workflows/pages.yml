name: 🌐 Deploy Browser Node

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📁 Prepare deployment directory
        run: |
          mkdir -p _site
          cp -r www/index.html www/css www/manifest.json www/sw.js _site/
          # Create placeholder for WASM
          mkdir -p _site/pkg
          echo '// WASM placeholder' > _site/pkg/tao_browser.js

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
