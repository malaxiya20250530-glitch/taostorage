name: 🚀 Release — 万物归道

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: 🚀 Release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ''
            cross: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ''
            cross: false
          - target: aarch64-linux-android
            os: ubuntu-latest
            suffix: ''
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ''
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ''
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: '.exe'
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: 🔧 Install cross
        if: matrix.cross
        run: cargo install cross

      - name: 🔨 Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --bin tao

      - name: 🔨 Build (native)
        if: !matrix.cross
        run: cargo build --release --target ${{ matrix.target }} --bin tao

      - name: 📦 Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ../../tao-${{ matrix.target }}.zip tao${{ matrix.suffix }}
          else
            tar czf ../../tao-${{ matrix.target }}.tar.gz tao${{ matrix.suffix }}
          fi

      - name: 📤 Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: tao-${{ matrix.target }}.tar.gz
          generate_release_notes: true
          body: |
            ## 🦀 TaoStorage ${{ github.ref_name }}

            > 道可道，非常道 — 个人数据仓库 CLI + 分布式存储网络

            ### 📦 下载
            选择对应平台的二进制文件，解压后运行 `./tao`。

            ### 🚀 快速开始
            ```bash
            ./tao init
            ./tao put 道 "道可道，非常道"
            ./tao get 道
            ./tao daemon start
            ```

            完整安装：`curl -fsSL https://tao.storage/install.sh | bash`
