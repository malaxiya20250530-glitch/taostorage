name: CI — 道可道

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check:
    name: 🔍 cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --package tao-core --package tao-crypto
      
  build:
    name: 🦀 Build tao
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build tao CLI
        run: cargo build --release --bin tao --package tao-cli
      - uses: actions/upload-artifact@v4
        with:
          name: tao-linux
          path: target/release/tao
