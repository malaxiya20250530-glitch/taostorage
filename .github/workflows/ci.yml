name: CI — 道可道

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================
  # 检查 + 测试
  # ============================================================
  check:
    name: 🔍 Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Setup Rust (stable)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: 📦 Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: 🔨 Build
        run: cargo build --workspace

      - name: 🧪 Test
        run: cargo test --workspace

      - name: ✨ Format check
        run: cargo fmt --all -- --check

      - name: 🕵️ Clippy
        run: cargo clippy --workspace -- -D warnings

  # ============================================================
  # WASM 编译验证
  # ============================================================
  wasm:
    name: 🌐 WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: 📦 Install wasm-pack
        run: |
          curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh -s -- -y

      - name: 🔨 Build WASM
        run: wasm-pack build www/tao-browser --target web --out-dir ../pkg

      - name: 📤 Upload WASM
        uses: actions/upload-artifact@v4
        with:
          name: tao-wasm-pkg
          path: www/pkg/

  # ============================================================
  # Linux 构建 (原生)
  # ============================================================
  build-linux:
    name: 📦 Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 Cache
        uses: Swatinem/rust-cache@v2

      - name: 🔧 Install cross
        if: ${{ matrix.target != 'x86_64-unknown-linux-gnu' }}
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: 🔨 Build (cross)
        if: ${{ matrix.target != 'x86_64-unknown-linux-gnu' }}
        run: cross build --release --target ${{ matrix.target }} --bin tao

      - name: 🔨 Build (native)
        if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
        run: cargo build --release --bin tao

      - uses: actions/upload-artifact@v4
        with:
          name: tao-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/tao

  # ============================================================
  # macOS 构建
  # ============================================================
  build-macos:
    name: 📦 macOS (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 Cache
        uses: Swatinem/rust-cache@v2

      - name: 🔨 Build
        run: cargo build --release --target ${{ matrix.target }} --bin tao

      - uses: actions/upload-artifact@v4
        with:
          name: tao-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/tao

  # ============================================================
  # Windows 构建
  # ============================================================
  build-windows:
    name: 📦 Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Cache
        uses: Swatinem/rust-cache@v2

      - name: 🔨 Build
        run: cargo build --release --bin tao

      - uses: actions/upload-artifact@v4
        with:
          name: tao-x86_64-pc-windows-msvc
          path: target/release/tao.exe

  # ============================================================
  # 安全审计
  # ============================================================
  security:
    name: 🛡️ Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 🔍 Audit
        uses: actions-rust-lang/audit@v1
