name: CI — 道可道

on:
  push:
    branches: [ master, main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ master, main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================
  # 检查 + 测试
  # ============================================================
  check:
    name: 🔍 Check & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [ stable, nightly ]
    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Setup Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: 📦 Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: 🔨 Build all crates
        run: cargo build --workspace --all-targets

      - name: 🧪 Run tests
        run: cargo test --workspace

      - name: ✨ Check formatting
        run: cargo fmt --all -- --check

      - name: 🕵️ Clippy
        run: cargo clippy --workspace -- -D warnings

  # ============================================================
  # WASM 编译验证
  # ============================================================
  wasm:
    name: 🌐 WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: 📦 Install wasm-pack
        run: curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: 🔨 Build browser WASM
        run: wasm-pack build www/tao-browser --target web --out-dir ../pkg

      - name: 📦 Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: tao-wasm-pkg
          path: www/pkg/

  # ============================================================
  # 跨平台二进制构建
  # ============================================================
  build:
    name: 📦 Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: 🔧 Install cross
        if: matrix.cross
        run: cargo install cross

      - name: 🔨 Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --bin tao

      - name: 🔨 Build (native)
        if: !matrix.cross
        run: cargo build --release --target ${{ matrix.target }} --bin tao

      - name: 📤 Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tao-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/tao${{ matrix.target == 'x86_64-pc-windows-msvc' && '.exe' || '' }}

  # ============================================================
  # 安全审计
  # ============================================================
  security:
    name: 🛡️ Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: 📦 Install cargo-audit
        run: cargo install cargo-audit
      - name: 🔍 Audit
        run: cargo audit
